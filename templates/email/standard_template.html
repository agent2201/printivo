<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f8f9fa;
            padding-bottom: 40px;
        }

        .main {
            background-color: #ffffff;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-spacing: 0;
            font-family: sans-serif;
            color: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-top: 20px;
        }

        .header {
            padding: 40px 0;
            text-align: center;
            background: #ffffff;
        }

        .logo {
            width: 180px;
            height: auto;
        }

        .content {
            padding: 20px 40px 40px;
            line-height: 1.6;
            font-size: 16px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #000000;
            letter-spacing: -0.5px;
        }

        p {
            margin-bottom: 20px;
            color: #4a4a4a;
        }

        .button-container {
            text-align: center;
            margin: 40px 0;
        }

        .button {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, #FF0080 0%, #00BFFF 100%);
            color: #ffffff !important;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 4px 15px rgba(255, 0, 128, 0.3);
            transition: transform 0.2s ease;
        }

        .footer {
            padding: 30px;
            text-align: center;
            font-size: 12px;
            color: #9b9b9b;
            background-color: #fcfcfc;
            border-top: 1px solid #f0f0f0;
        }

        .accent {
            background: linear-gradient(to right, #FF0080, #00BFFF);
            height: 4px;
            width: 100%;
        }

        .social-icons {
            margin-top: 20px;
        }

        .social-icons a {
            margin: 0 10px;
            text-decoration: none;
            color: #9b9b9b;
        }

        @media screen and (max-width: 600px) {
            .content {
                padding: 20px 25px 40px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <table class="main" width="100%">
            <tr>
                <td class="accent"></td>
            </tr>
            <tr>
                <td class="header">
                    <!-- Замените URL на ваш загруженный логотип -->
                    <img src="https://raw.githubusercontent.com/agent2201/printivo/master/INBOX/logo_printivo.png" alt="Printivo Logo" class="logo">
                </td>
            </tr>
            <tr>
                <td class="content">
                    <h1>{{title}}</h1>
                    <p>Hello {{recipient_name}},</p>
                    <p>{{message_body}}</p>
                    
                    <div class="button-container">
                        <a href="{{cta_link}}" class="button">{{cta_text}}</a>
                    </div>
                    
                    <p>Regards,<br><strong>The Printivo Team</strong></p>
                </td>
            </tr>
            <tr>
                <td class="footer">
                    <p>&copy; 2026 Printivo. All rights reserved.<br>
                    Automated by NEXUS Engine.</p>
                    <div class="social-icons">
                        <a href="#">Instagram</a>
                        <a href="#">Facebook</a>
                        <a href="#">Website</a>
                    </div>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
