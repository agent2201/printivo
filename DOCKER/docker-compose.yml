version: '3.8'

services:
  # Postgres with pgvector extension for Local RAG
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nexus_admin
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: nexus_core
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data

  # Upstash Redis local alternative
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nexus_redis_data:/data

  # Deep Graph Memory for NEXUS
  neo4j:
    image: neo4j:5-community
    container_name: nexus_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/nexus_graph_db"
    volumes:
      - nexus_neo4j_data:/data

  # Local S3 Storage (MinIO)
  minio:
    image: minio/minio:latest
    container_name: nexus_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: printivo
      MINIO_ROOT_PASSWORD: printivo
    command: server /data --console-address ":9001"
    volumes:
      - ../MinIO:/data

  # NEXUS Logic Engine (Python Gateway)
  nexus_api:
    build: ../services/nexus_api
    container_name: nexus_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MINIO_URL=minio:9000
    depends_on:
      - minio

  # Unified Gateway (Nginx)
  gateway:
    image: nginx:alpine
    container_name: nexus_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - minio
      - nexus_api

volumes:
  nexus_pgdata:
  nexus_redis_data:
  nexus_neo4j_data:
  nexus_minio_data:
