events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    client_max_body_size 1G;

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://nexus_api:8000;
        }

        location /api/ {
            proxy_pass http://nexus_api:8000/;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_request_buffering off;
        }

        location /s3/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host minio:9000; # Должно совпадать с MINIO_URL при генерации подписи
            proxy_set_header X-Real-IP $remote_addr;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,ngrok-skip-browser-warning';
                add_header 'Access-Control-Max-Age' 1728000;
                return 204;
            }
        }
    }
}
